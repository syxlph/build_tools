name: Publish Builder Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Builder image tag to publish
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-builder-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/onlyoffice-builder:${{ inputs.image_tag }}
